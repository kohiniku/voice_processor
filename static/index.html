<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASR Transcription</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-radius: 12px;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .upload-area {
            border: 2px dashed #e5e7eb;
            border-radius: var(--border-radius);
            padding: 2rem;
            cursor: pointer;
            transition: border-color 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background-color: #f9fafb;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            pointer-events: none;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        #result-area {
            margin-top: 2rem;
            text-align: left;
            display: none;
        }

        #result-text {
            width: 100%;
            height: 150px;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            background: #fafafa;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: -4px;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #file-name {
            margin-top: 10px;
            font-weight: 500;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音声ファイル文字起こし</h1>
    
    <div class="upload-area" id="drop-zone" onclick="document.getElementById('audio-file').click()">
        <input type="file" id="audio-file" accept="audio/*">
        <div class="upload-label">
            <span class="icon">📁</span>
            <span>ファイルを選択 または ドラッグ＆ドロップ</span>
            <span id="file-name"></span>
        </div>
    </div>

    <button id="transcribe-btn" onclick="transcribe()">文字起こし開始</button>

    <div id="result-area">
        <h3>結果:</h3>
        <textarea id="result-text" readonly></textarea>
    </div>
</div>

<script>
    const fileInput = document.getElementById('audio-file');
    const fileNameDisplay = document.getElementById('file-name');
    const dropZone = document.getElementById('drop-zone');
    const transcribeBtn = document.getElementById('transcribe-btn');
    const resultArea = document.getElementById('result-area');
    const resultText = document.getElementById('result-text');

    // Drag and Drop Logic
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            updateFileName();
        }
    });

    fileInput.addEventListener('change', updateFileName);

    function updateFileName() {
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = fileInput.files[0].name;
            resultArea.style.display = 'none'; // Reset result when file changes
        } else {
            fileNameDisplay.textContent = '';
        }
    }

    async function transcribe() {
        if (fileInput.files.length === 0) {
            alert('音声ファイルを選択してください。');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);

        // UI State: Loading
        transcribeBtn.disabled = true;
        const originalBtnText = transcribeBtn.innerHTML;
        transcribeBtn.innerHTML = '処理中... <div class="loading"></div>';
        resultArea.style.display = 'none';
        resultText.value = '';

        try {
            const response = await fetch('/transcribe', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error('サーバーエラーが発生しました');
            }

            const data = await response.json();
            
            if (data.error) {
                resultText.value = 'エラー: ' + data.error;
            } else {
                resultText.value = data.text;
            }
            resultArea.style.display = 'block';

        } catch (error) {
            alert('エラーが発生しました: ' + error.message);
        } finally {
            transcribeBtn.disabled = false;
            transcribeBtn.innerHTML = originalBtnText;
        }
    }
</script>

</body>
</html>
