<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASR Transcription (Streaming)</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-radius: 12px;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .upload-area {
            border: 2px dashed #e5e7eb;
            border-radius: var(--border-radius);
            padding: 2rem;
            cursor: pointer;
            transition: border-color 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background-color: #f9fafb;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            pointer-events: none;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        #progress-container {
            margin-top: 2rem;
            display: none;
            text-align: left;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .progress-bar-bg {
            background-color: #e5e7eb;
            border-radius: 999px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        #result-area {
            margin-top: 1rem;
            text-align: left;
            display: none;
        }

        #partial-texts {
            background: #fafafa;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        .partial-item {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed #e5e7eb;
        }
        .partial-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .partial-badge {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: -4px;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #file-name {
            margin-top: 10px;
            font-weight: 500;
            color: var(--primary-color);
        }

        /* ─── History Section ─── */
        .history-section {
            margin-top: 2.5rem;
            text-align: left;
            border-top: 1px solid #e5e7eb;
            padding-top: 1.5rem;
        }

        .history-section h2 {
            font-size: 1.15rem;
            margin: 0 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-section h2 .badge {
            background: var(--primary-color);
            color: #fff;
            font-size: 0.75rem;
            padding: 0.15rem 0.55rem;
            border-radius: 999px;
            font-weight: 600;
        }

        .history-empty {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 1rem 0;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .history-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            transition: box-shadow 0.2s;
            position: relative;
        }

        .history-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .history-filename {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .history-date {
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .history-text {
            font-size: 0.88rem;
            color: #374151;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 4.5em;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .history-text.expanded {
            max-height: none;
        }

        .history-text:not(.expanded)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1.5em;
            background: linear-gradient(transparent, var(--card-bg));
            pointer-events: none;
        }

        .history-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.5rem;
            gap: 0.5rem;
        }

        .btn-small {
            background: none;
            border: 1px solid #e5e7eb;
            color: var(--text-muted);
            padding: 0.3rem 0.65rem;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            width: auto;
            transition: 0.15s;
        }

        .btn-small:hover {
            background: #f3f4f6;
            color: var(--text-color);
        }

        .btn-delete {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .btn-delete:hover {
            background: #fef2f2;
            color: var(--danger-hover);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音声ファイル文字起こし <small style="font-size:0.5em; color:#888;">(進捗表示対応)</small></h1>
    
    <div class="upload-area" id="drop-zone" onclick="document.getElementById('audio-file').click()">
        <input type="file" id="audio-file" accept="audio/*">
        <div class="upload-label">
            <span class="icon">📁</span>
            <span>ファイルを選択 または ドラッグ＆ドロップ</span>
            <span id="file-name"></span>
        </div>
    </div>

    <button id="transcribe-btn" onclick="transcribe()">文字起こし開始</button>

    <div id="progress-container">
        <div class="progress-label">
            <span id="progress-text">処理準備中...</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="result-area">
        <h3>結果 (プレビュー):</h3>
        <div id="partial-texts"></div>
    </div>

    <!-- History Section -->
    <div class="history-section" id="history-section">
        <h2>📋 履歴 <span class="badge" id="history-count">0</span></h2>
        <div id="history-container">
            <p class="history-empty">履歴はまだありません</p>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('audio-file');
    const fileNameDisplay = document.getElementById('file-name');
    const dropZone = document.getElementById('drop-zone');
    const transcribeBtn = document.getElementById('transcribe-btn');
    
    const progressContainer = document.getElementById('progress-container');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    const progressFill = document.getElementById('progress-fill');
    
    const resultArea = document.getElementById('result-area');
    const partialTextsContainer = document.getElementById('partial-texts');

    // ─── Drag and Drop ───
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            updateFileName();
        }
    });

    fileInput.addEventListener('change', updateFileName);

    function updateFileName() {
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = fileInput.files[0].name;
            recordedBlob = null; // Clear previous recording if file is selected
            resetUI();
        } else {
            fileNameDisplay.textContent = '';
        }
    }

    function resetUI() {
        progressContainer.style.display = 'none';
        resultArea.style.display = 'none';
        partialTextsContainer.innerHTML = '';
        progressFill.style.width = '0%';
        progressPercent.textContent = '0%';
        progressText.textContent = '処理準備中...';
    }

    // ─── Transcribe (SSE Streaming) ───
    async function transcribe() {
        if (fileInput.files.length === 0) {
            alert('音声ファイルを選択してください。');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);

        transcribeBtn.disabled = true;
        const originalBtnText = transcribeBtn.innerHTML;
        transcribeBtn.innerHTML = '処理中... <div class="loading"></div>';
        
        resetUI();
        progressContainer.style.display = 'block';
        resultArea.style.display = 'block';

        try {
            // EventSource can't send POST with FormData, so we use fetch + ReadableStream
            const response = await fetch('/transcribe/stream', {
                method: 'POST',
                body: formData,
                headers: {
                    // Tell server we want EventStream, though the endpoint already returns it
                    'Accept': 'text/event-stream'
                }
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || 'サーバーエラーが発生しました');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                
                // Keep the last partial line in the buffer
                buffer = lines.pop();

                let currentEvent = null;

                for (const line of lines) {
                    if (line.startsWith('event: ')) {
                        currentEvent = line.substring(7).trim();
                    } else if (line.startsWith('data: ')) {
                        const dataStr = line.substring(6).trim();
                        if (!currentEvent || !dataStr) continue;

                        try {
                            const data = JSON.parse(dataStr);
                            handleSSEEvent(currentEvent, data);
                        } catch (e) {
                            console.error("JSON parse error:", e, dataStr);
                        }
                    }
                }
            }
            
            // Final update after stream closed
            progressFill.style.width = '100%';
            progressPercent.textContent = '100%';
            progressText.textContent = '完了しました';
            await loadHistory();

        } catch (error) {
            alert('エラーが発生しました: ' + error.message);
            progressText.textContent = 'エラー発生';
        } finally {
            transcribeBtn.disabled = false;
            transcribeBtn.innerHTML = originalBtnText;
        }
    }

    function handleSSEEvent(event, data) {
        if (event === 'progress') {
            const pct = Math.min(100, data.percent);
            progressFill.style.width = pct + '%';
            progressPercent.textContent = pct + '%';
            progressText.textContent = `チャンク ${data.chunk} / ${data.total} を処理中...`;
        } 
        else if (event === 'partial') {
            addPartialText(data.chunk, data.text);
        }
        else if (event === 'error') {
            alert('サーバーエラー: ' + data.message);
        }
        else if (event === 'done') {
            // Already handled in the main function finally block, but can add specifics here
        }
    }

    function addPartialText(chunkIdx, text) {
        const div = document.createElement('div');
        div.className = 'partial-item';
        div.innerHTML = `<span class="partial-badge">#${chunkIdx}</span> <span>${escapeHtml(text)}</span>`;
        partialTextsContainer.appendChild(div);
        
        // Auto scroll to bottom
        partialTextsContainer.scrollTop = partialTextsContainer.scrollHeight;
    }

    // ─── History ───
    async function loadHistory() {
        try {
            const res = await fetch('/history');
            if (!res.ok) return;
            const items = await res.json();
            renderHistory(items);
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }

    function renderHistory(items) {
        const container = document.getElementById('history-container');
        const countBadge = document.getElementById('history-count');
        countBadge.textContent = items.length;

        if (items.length === 0) {
            container.innerHTML = '<p class="history-empty">履歴はまだありません</p>';
            return;
        }

        const ul = document.createElement('ul');
        ul.className = 'history-list';

        for (const item of items) {
            const li = document.createElement('li');
            li.className = 'history-item';

            const dateStr = formatDate(item.created_at);

            li.innerHTML = `
                <div class="history-meta">
                    <span class="history-filename" title="${escapeHtml(item.filename)}">${escapeHtml(item.filename)}</span>
                    <span class="history-date">${dateStr}</span>
                </div>
                <div class="history-text" onclick="this.classList.toggle('expanded')">${escapeHtml(item.text)}</div>
                <div class="history-actions">
                    <button class="btn-small" onclick="copyText(this, ${JSON.stringify(item.text).replace(/"/g, '&quot;')})">📋 コピー</button>
                    <button class="btn-small" onclick="downloadText('${escapeHtml(item.filename)}.txt', ${JSON.stringify(item.text).replace(/"/g, '&quot;')})">⬇️ DL</button>
                    <button class="btn-small btn-delete" onclick="deleteHistory(${item.id})">🗑 削除</button>
                </div>
            `;
            ul.appendChild(li);
        }

        container.innerHTML = '';
        container.appendChild(ul);
    }

    async function deleteHistory(id) {
        if (!confirm('この履歴を削除しますか？')) return;
        try {
            const res = await fetch(`/history/${id}`, { method: 'DELETE' });
            if (res.ok) {
                await loadHistory();
            }
        } catch (e) {
            console.error('Failed to delete:', e);
        }
    }

    function downloadText(filename, text) {
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function copyText(btn, text) {
        if (!navigator.clipboard) {
            // Fallback for non-HTTPS environments
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                const orig = btn.textContent;
                btn.textContent = '✅ コピー済';
                setTimeout(() => { btn.textContent = orig; }, 1500);
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
                alert("コピーに失敗しました");
            }
            document.body.removeChild(textArea);
            return;
        }
        
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✅ コピー済';
            setTimeout(() => { btn.textContent = orig; }, 1500);
        }).catch(err => {
            console.error('Async: Could not copy text: ', err);
            alert("コピーに失敗しました");
        });
    }

    function formatDate(isoStr) {
        const d = new Date(isoStr);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Load history on page load
    loadHistory();
</script>

</body>
</html>
